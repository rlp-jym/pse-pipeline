name: PSE Pipeline

on:
    schedule:
        - cron: '0 18 * * 0-5'
    workflow_dispatch: 

jobs:
    run-pipeline:
        runs-on: ubuntu-latest
    
        steps:
            - uses: actions/checkout@v4
          
            - name: Build Docker image
              run: docker build -t pse-pipeline:v01 .
              working-directory: ${{ github.workspace }}

            - name: Run price pipeline
              env:
                SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
                SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
              run: |
                docker run --rm \
                  -e SUPABASE_URL=$SUPABASE_URL \
                  -e SUPABASE_KEY=$SUPABASE_KEY \
                  pse-pipeline:v01 uv run python pse_pipeline_price.py

            - name: Run meta pipeline
              env:
                SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
                SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
              run: |
                docker run --rm \
                  -e SUPABASE_URL=$SUPABASE_URL \
                  -e SUPABASE_KEY=$SUPABASE_KEY \
                  pse-pipeline:v01 uv run python pse_pipeline_meta.py

            - name: Run dbt pipeline
              env:
                SUPABASE_S3_KEY: ${{ secrets.SUPABASE_S3_KEY }}
                SUPABASE_S3_SECRET: ${{ secrets.SUPABASE_S3_SECRET }}
                SUPABASE_S3_ENDPOINT: ${{ secrets.SUPABASE_S3_ENDPOINT }}
              run: |
                docker run --rm \
                  -e SUPABASE_S3_KEY=$SUPABASE_S3_KEY \
                  -e SUPABASE_S3_SECRET=$SUPABASE_S3_SECRET \
                  -e SUPABASE_S3_ENDPOINT=$SUPABASE_S3_ENDPOINT \
                  pse-pipeline:v01 sh -c "
                    cd /app/dbt_pse_pipeline && \
                    uv run python seed_fx_rates.py && \
                    uv run dbt seed --profiles-dir . && \
                    uv run dbt build --profiles-dir .
                  "
