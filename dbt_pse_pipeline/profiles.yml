dbt_pse_pipeline:
  target: dev
  outputs:
    dev:
      type: duckdb
      path: dev.duckdb
      extensions:
        - httpfs
      settings:
        s3_endpoint: "{{ env_var('SUPABASE_S3_ENDPOINT') }}"
        s3_access_key_id: "{{ env_var('SUPABASE_S3_KEY') }}"
        s3_secret_access_key: "{{ env_var('SUPABASE_S3_SECRET') }}"
        s3_region: "ap-northeast-1"
        s3_url_style: "path"